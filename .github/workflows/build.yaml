name: Build PreTeXt

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PreTeXt
        run: pip install pretext

      - name: Build
        run: pretext build html

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pretext-html
          path: output/html
